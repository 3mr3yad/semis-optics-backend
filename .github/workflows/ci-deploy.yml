name: CI & Deploy (Laravel)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: laravel-prod
  cancel-in-progress: true

jobs:
  test:
    name: Run PHP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, pcntl, intl, sqlite, pdo_sqlite, curl
          coverage: none

      - name: Prepare Laravel directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

          chmod -R 775 bootstrap/cache storage

      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app key testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --without-tty

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure SSH secrets exist
        run: |
          echo "SSH_KEY length:      $(echo "${{ secrets.SSH_KEY }}" | wc -c)"
          echo "SSH_HOST present?    $([ -n "${{ secrets.SSH_HOST }}" ] && echo yes || echo no)"
          echo "SSH_USER present?    $([ -n "${{ secrets.SSH_USER }}" ] && echo yes || echo no)"
          echo "SSH_PORT present?    $([ -n "${{ secrets.SSH_PORT }}" ] && echo yes || echo no)"
          echo "DEPLOY_PATH present? $([ -n "${{ secrets.DEPLOY_PATH }}" ] && echo yes || echo no)"
          echo "ENV_PROD present?    $([ -n "${{ secrets.ENV_PROD }}" ] && echo yes || echo no)"

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'vendor' \
            --exclude 'node_modules' \
            --exclude 'storage' \
            --exclude 'public/storage' \
            --exclude '.env' \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Write .env on server from secret
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV_PROD
          script: |
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            echo "==> Write production .env"
            printf '%s\n' "$ENV_PROD" > .env

      - name: Run deploy commands on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          RUN_SHIELD: ${{ secrets.RUN_SHIELD }}
          SUPER_ADMIN_ID: ${{ secrets.SUPER_ADMIN_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: RUN_SHIELD,SUPER_ADMIN_ID
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"

            echo "==> Make sure app comes back up if deploy fails"
            trap 'php artisan up || true' EXIT

            echo "==> Clear old Laravel bootstrap cache BEFORE anything"
            rm -f bootstrap/cache/*.php || true

            echo "==> Prepare Laravel writable directories BEFORE composer"
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/framework/cache
            mkdir -p storage/logs
            mkdir -p storage/app/public
            mkdir -p public
            mkdir -p bootstrap/cache

            if [ -e storage/app/public ] && [ ! -d storage/app/public ]; then
              echo "storage/app/public exists but is not a directory, removing it"
              rm -f storage/app/public
              mkdir -p storage/app/public
            fi

            echo "==> Fix permissions"
            sudo chown -R www-data:www-data storage bootstrap/cache || true
            sudo find storage -type d -exec chmod 775 {} \; || true
            sudo find storage -type f -exec chmod 664 {} \; || true
            sudo chmod -R 775 bootstrap/cache || true

            echo "==> Put app in maintenance mode"
            php artisan down --refresh=60 || true

            echo "==> Install composer deps without dev packages and without scripts"
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress --no-scripts

            echo "==> Clear Laravel bootstrap cache AFTER composer"
            rm -f bootstrap/cache/*.php || true

            echo "==> Rebuild composer autoload"
            composer dump-autoload --optimize --no-dev

            echo "==> Run Laravel package discovery"
            php artisan package:discover --ansi

            echo "==> Clear Laravel caches"
            php artisan optimize:clear || true

            echo "==> Run migrations"
            php artisan migrate --force

            echo "==> Create storage link"
            if [ -e public/storage ] && [ ! -L public/storage ]; then
              echo "public/storage exists but is not a symlink, removing it"
              rm -rf public/storage
            fi

            php artisan storage:link || true

            echo "==> Run Filament Shield commands if enabled"
            if [ "${RUN_SHIELD:-0}" = "1" ]; then
              php artisan shield:generate --all || true

              if [ -n "${SUPER_ADMIN_ID:-}" ]; then
                php artisan shield:super-admin --user="${SUPER_ADMIN_ID}" || true
              fi
            fi

            echo "==> Cache Laravel for production"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "==> Restart queue"
            php artisan queue:restart || true

            echo "==> Bring app back up"
            php artisan up || true

            echo "==> Reload PHP-FPM"
            sudo systemctl reload php8.3-fpm || sudo systemctl reload php8.2-fpm || sudo systemctl reload php8.1-fpm || true

            trap - EXIT

      - name: Health check
        run: |
          curl -fsS --max-time 10 "https://${{ secrets.HEALTHCHECK_HOST }}/api/health" || \
          curl -I "https://${{ secrets.HEALTHCHECK_HOST }}" || true